{% extends "base.html" %}
{% block title %}SEMCDS | Forgot Password{% endblock %}
{% block public_content %}
<section class="auth-shell compact">
    <div class="auth-card single-card">
        <div class="auth-card-head">
            <span class="brand-mark auth-brand-mark">🔐</span>
            <div>
                <h2>Forgot Password</h2>
                <p>Enter your email and we will send reset instructions.</p>
            </div>
        </div>

        {% if message %}
        <div class="auth-message success">{{ message }}</div>
        {% endif %}

        <form method="post" class="auth-form">
            <label>Email Address
                <input type="email" name="email" placeholder="you@example.com" required>
            </label>
            <button class="button primary auth-submit" type="submit">Send Reset Link</button>
        </form>

        <a class="auth-link back-inline" href="{{ url_for('login') }}">&larr; Back to login</a>
    </div>
</section>
{% endblock %}
